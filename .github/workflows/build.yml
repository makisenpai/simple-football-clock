name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on tags like v1.0, v1.2.3

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Build exe
        run: python -m PyInstaller sports_clock.spec --noconfirm --clean

      - name: Prepare release folder
        run: |
          New-Item -ItemType Directory -Force release\logos
          Copy-Item dist\SportsClockApp.exe release\
          Copy-Item logos\* release\logos\ -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Zip release
        run: Compress-Archive -Path release\* -DestinationPath SportsClockApp.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SportsClockApp.zip
          generate_release_notes: true
